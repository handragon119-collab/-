<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>스레드 자동 업로드</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg: #0f1115;
    --card: #181b22;
    --card2: #1f232c;
    --line: #2a2f3a;
    --text: #f2f4f8;
    --muted: #9aa3b2;
    --accent1: #7c5cff;
    --accent2: #4da3ff;
    --accent: linear-gradient(135deg, #7c5cff 0%, #4da3ff 100%);
    --ok: #2ec27e;
    --err: #ff5d6c;
    --radius: 18px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, sans-serif;
    margin: 0; background: var(--bg); color: var(--text);
    background-image: radial-gradient(1200px 500px at 80% -10%, rgba(124,92,255,.18), transparent),
                      radial-gradient(900px 400px at -10% 0%, rgba(77,163,255,.14), transparent);
  }
  header {
    position: sticky; top: 0; z-index: 20; backdrop-filter: blur(12px);
    background: rgba(15,17,21,.72); border-bottom: 1px solid var(--line);
    padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  header h1 { font-size: 17px; margin: 0; font-weight: 800; letter-spacing: -.3px; }
  header h1 .dot { background: var(--accent); -webkit-background-clip: text; background-clip: text; color: transparent; }
  #status { font-size: 12px; color: var(--muted); text-align: right; line-height: 1.4; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 16px 14px 80px; }

  .tabs { display: flex; gap: 6px; margin-bottom: 16px; background: var(--card); padding: 6px; border-radius: 16px; border: 1px solid var(--line); }
  .tab { flex: 1; padding: 11px 6px; border: none; border-radius: 11px; background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 700; transition: .15s; }
  .tab.active { background: var(--accent); color: #fff; box-shadow: 0 6px 18px rgba(124,92,255,.35); }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
  .panel { display: none; }
  .panel.active { display: block; animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px);} to { opacity:1; transform:none; } }

  label { display: block; font-size: 13px; font-weight: 700; margin: 16px 0 8px; color: #cfd6e4; }
  label:first-child { margin-top: 0; }
  input[type=text], textarea, select {
    width: 100%; padding: 13px 14px; border: 1px solid var(--line); border-radius: 13px;
    font-size: 15px; font-family: inherit; background: var(--card2); color: var(--text); outline: none; transition: .15s;
  }
  input::placeholder, textarea::placeholder { color: #6b7382; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent1); box-shadow: 0 0 0 3px rgba(124,92,255,.18); }
  textarea { min-height: 150px; line-height: 1.65; resize: vertical; }

  button.primary {
    background: var(--accent); color: #fff; border: none; border-radius: 14px;
    padding: 15px 18px; font-size: 15px; font-weight: 800; cursor: pointer; width: 100%;
    box-shadow: 0 8px 22px rgba(124,92,255,.35); transition: transform .08s, filter .15s;
  }
  button.primary:active { transform: scale(.985); }
  button.primary:disabled { opacity: .55; cursor: not-allowed; box-shadow: none; }
  button.ghost {
    background: var(--card2); color: var(--text); border: 1px solid var(--line); border-radius: 13px;
    padding: 13px 16px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; transition: .12s;
  }
  button.ghost:active { transform: scale(.985); }
  .row { display: flex; gap: 10px; margin-top: 10px; }
  .row > * { flex: 1; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.55; }
  .count { font-size: 12px; color: var(--muted); text-align: right; margin-top: 6px; }
  .divider { height: 1px; background: var(--line); margin: 18px 0 6px; border: 0; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip-cat { padding: 9px 14px; border-radius: 999px; border: 1px solid var(--line); background: var(--card2); color: #cfd6e4; cursor: pointer; font-size: 13px; font-weight: 700; transition: .12s; }
  .chip-cat.sel { background: var(--accent); border-color: transparent; color: #fff; box-shadow: 0 4px 14px rgba(124,92,255,.4); }

  /* 현재 계정 배너 */
  .acct-banner { display:flex; align-items:center; justify-content:space-between; gap:10px;
    background: linear-gradient(135deg, rgba(124,92,255,.16), rgba(77,163,255,.12));
    border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px; margin-bottom: 16px; }
  .acct-banner img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }

  /* 미디어 미리보기 */
  #mediaWrap { margin-top: 14px; }
  .media-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .media-grid img, .media-grid video { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; border: 1px solid var(--line); }
  #videoPrev { width: 100%; border-radius: 14px; border: 1px solid var(--line); margin-bottom: 8px; max-height: 320px; }

  .toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px);
    background: #11141a; border: 1px solid var(--line); color: #fff; padding: 13px 18px; border-radius: 14px;
    font-size: 14px; font-weight: 600; opacity: 0; transition: .28s; pointer-events: none; z-index: 60; max-width: 92%; box-shadow: 0 12px 30px rgba(0,0,0,.4); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok { border-color: var(--ok); }
  .toast.error { border-color: var(--err); }

  .item { border: 1px solid var(--line); border-radius: 14px; padding: 13px; margin-bottom: 10px; background: var(--card2); }
  .item-time { font-size: 11px; color: var(--muted); }
  .item-text { font-size: 14px; line-height: 1.55; margin-top: 5px; white-space: pre-wrap; }
  .badge { display:inline-block; padding:6px 11px; border-radius:999px; font-size:12px; font-weight:700; }
  .badge.on { background: rgba(46,194,126,.16); color: var(--ok); }
  .badge.off { background: var(--card2); color: var(--muted); }
  .spin { display:inline-block; width:14px; height:14px; border:2px solid #fff; border-top-color:transparent; border-radius:50%; animation:r .7s linear infinite; vertical-align:-2px; margin-right:6px; }
  @keyframes r { to { transform: rotate(360deg);} }
  .acct-row { display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .acct-row img, .acct-row .ph { width:40px; height:40px; border-radius:50%; object-fit:cover; }
  .acct-row .ph { background: var(--card); display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>
<header>
  <h1>🧵 스레드 <span class="dot">오토</span></h1>
  <span id="status">상태 확인 중…</span>
</header>

<div class="wrap">
  <div class="tabs">
    <button class="tab active" data-tab="write">✍️ 글쓰기</button>
    <button class="tab" data-tab="topics">📋 주제</button>
    <button class="tab" data-tab="accounts">👤 계정</button>
    <button class="tab" data-tab="schedule">⏰ 자동</button>
    <button class="tab" data-tab="history">📜 기록</button>
  </div>

  <!-- 글쓰기 -->
  <div class="panel active" id="panel-write">
    <div class="card">
      <div class="acct-banner" id="currentAcct"><span class="hint">계정 불러오는 중…</span></div>

      <label>① 카테고리</label>
      <div id="catChips" class="chips"></div>

      <label>② 주제 (자동 또는 직접)</label>
      <input type="text" id="topicInput" placeholder="'자동 주제 설정'을 누르거나 직접 입력" />
      <button class="ghost" id="randTopicBtn" style="margin-top:8px">🎯 자동 주제 설정 (랜덤)</button>

      <label>③ 만들기</label>
      <button class="primary" id="autoBtn">🎲 글 + 사진 한 번에 자동 생성</button>
      <button class="ghost" id="genBtn" style="margin-top:8px">✨ 글만 생성</button>
      <p class="hint">🧠 리서치 · 팩트체크 · MZ 반말 문체로 작성해요. (40~80초)</p>

      <hr class="divider" />
      <label>📷 내 사진 · 영상 사용</label>
      <div class="row">
        <button class="ghost" id="uploadBtn">📁 사진/영상 올리기</button>
        <button class="ghost" id="uploadWriteBtn">🖼️ 보고 AI 글쓰기</button>
      </div>
      <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display:none" />
      <p class="hint">사진 여러 장 또는 동영상 1개를 올릴 수 있어요. 'AI 글쓰기'는 올린 사진·영상을 보고 어울리는 글을 써줍니다.</p>

      <label>생성된 글 (수정 가능)</label>
      <textarea id="postText" placeholder="여기에 글이 나와요. 직접 써도 됩니다."></textarea>
      <div class="count"><span id="charCount">0</span> / 500자</div>

      <div id="mediaWrap" style="display:none">
        <video id="videoPrev" controls style="display:none"></video>
        <div class="media-grid" id="imgGrid"></div>
        <button class="ghost" id="clearMediaBtn" style="margin-top:8px">🗑 미디어 빼기</button>
      </div>

      <label>게시할 계정 (체크한 계정 모두에)</label>
      <div id="postAccounts" class="chips"></div>

      <button class="primary" id="postBtn" style="margin-top:14px">🚀 스레드에 게시</button>
    </div>
  </div>

  <!-- 주제 -->
  <div class="panel" id="panel-topics">
    <div class="card">
      <label>주제 목록 ([카테고리] 아래 한 줄에 하나씩)</label>
      <textarea id="topicsArea" style="min-height:320px" placeholder="[일상]&#10;오늘의 작은 습관"></textarea>
      <p class="hint"># 으로 시작하는 줄은 메모입니다.</p>
      <button class="primary" id="saveTopicsBtn" style="margin-top:8px">💾 저장</button>
    </div>
  </div>

  <!-- 계정 -->
  <div class="panel" id="panel-accounts">
    <div class="card">
      <label>등록된 계정</label>
      <div id="accountList"><p class="hint">불러오는 중…</p></div>
      <button class="ghost" id="refreshAccBtn" style="margin-top:8px">🔄 계정 정보(아이디·사진) 새로고침</button>
      <hr class="divider" />
      <label>새 계정 추가</label>
      <input type="text" id="accLabel" placeholder="계정 이름(메모, 예: 메인)" style="margin-bottom:8px" />
      <input type="text" id="accUserId" placeholder="THREADS_USER_ID (사용자 ID 숫자)" style="margin-bottom:8px" />
      <input type="text" id="accToken" placeholder="THREADS_ACCESS_TOKEN (긴 토큰)" style="margin-bottom:8px" />
      <button class="primary" id="addAccBtn">➕ 계정 추가</button>
      <p class="hint">계정마다 토큰이 필요해요. (토큰은 이 컴퓨터에만 저장됩니다)</p>
    </div>
  </div>

  <!-- 자동 -->
  <div class="panel" id="panel-schedule">
    <div class="card">
      <p>상태: <span id="schedBadge" class="badge off">꺼짐</span></p>
      <p class="hint" id="schedNext"></p>
      <label>자동 게시 시각</label>
      <select id="cronSelect">
        <option value="0 9 * * *">매일 오전 9시</option>
        <option value="0 12 * * *">매일 정오 12시</option>
        <option value="0 18 * * *">매일 오후 6시</option>
        <option value="0 21 * * *">매일 밤 9시</option>
        <option value="0 9,21 * * *">매일 오전 9시 + 밤 9시</option>
      </select>
      <div class="row">
        <button class="primary" id="schedStartBtn">▶️ 켜기</button>
        <button class="ghost" id="schedStopBtn">⏹ 끄기</button>
      </div>
      <p class="hint">⚠️ 이 앱(창)이 켜져 있는 동안만 자동 게시가 작동해요.</p>
    </div>
  </div>

  <!-- 기록 -->
  <div class="panel" id="panel-history">
    <div class="card">
      <button class="ghost" id="refreshHistBtn">🔄 새로고침</button>
      <div id="histList" style="margin-top:12px"><p class="hint">아직 게시 기록이 없어요.</p></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
function toast(msg, type) {
  const t = $("toast"); t.textContent = msg; t.className = "toast show " + (type || "");
  setTimeout(() => (t.className = "toast " + (type || "")), 3600);
}
async function api(path, opts) {
  const r = await fetch(path, Object.assign({ headers: { "Content-Type": "application/json" } }, opts));
  return r.json();
}

// 미디어 상태
let CUR_IMAGES = [];   // 공개 URL 배열
let CUR_VIDEO = null;  // 공개 URL
function renderMedia() {
  const wrap = $("mediaWrap"), grid = $("imgGrid"), vid = $("videoPrev");
  if (CUR_VIDEO) {
    vid.src = CUR_VIDEO; vid.style.display = "block"; grid.innerHTML = "";
    wrap.style.display = "block";
  } else if (CUR_IMAGES.length) {
    vid.style.display = "none";
    grid.innerHTML = CUR_IMAGES.map((u) => `<img src="${u}">`).join("");
    wrap.style.display = "block";
  } else {
    wrap.style.display = "none"; vid.style.display = "none"; grid.innerHTML = "";
  }
}
$("clearMediaBtn").onclick = () => { CUR_IMAGES = []; CUR_VIDEO = null; renderMedia(); };

// 탭
document.querySelectorAll(".tab").forEach((b) => {
  b.onclick = () => {
    document.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
    document.querySelectorAll(".panel").forEach((x) => x.classList.remove("active"));
    b.classList.add("active");
    $("panel-" + b.dataset.tab).classList.add("active");
    if (b.dataset.tab === "history") loadHistory();
    if (b.dataset.tab === "topics") loadTopics();
    if (b.dataset.tab === "accounts") loadAccounts();
  };
});

// 상태
async function loadStatus() {
  try {
    const s = await api("/api/status");
    let p = [];
    p.push(s.has_threads || (s.active_account) ? "스레드 ✅" : "스레드 ❌");
    p.push(s.has_anthropic ? "AI ✅" : "AI ❌");
    p.push(`오늘 ${s.posted_24h}/${s.daily_limit}`);
    if (s.active_account) p.push("👤 " + s.active_account);
    $("status").textContent = p.join(" · ");
    $("schedBadge").textContent = s.schedule_running ? "켜짐" : "꺼짐";
    $("schedBadge").className = "badge " + (s.schedule_running ? "on" : "off");
    $("schedNext").textContent = s.schedule_running && s.schedule_next ? ("다음 실행: " + s.schedule_next) : "";
    if (s.schedule_cron) $("cronSelect").value = s.schedule_cron;
  } catch (e) { $("status").textContent = "연결 오류"; }
}

$("postText").addEventListener("input", () => { $("charCount").textContent = $("postText").value.length; });

// 카테고리
let SEL_CAT = "";
async function loadCategories() {
  const r = await api("/api/categories");
  if (!r.ok) return;
  const box = $("catChips");
  const cats = ["전체(랜덤)"].concat(r.categories);
  box.innerHTML = cats.map((c) => {
    const val = c === "전체(랜덤)" ? "" : c;
    return `<span class="chip-cat${val === SEL_CAT ? " sel" : ""}" data-cat="${val}">${c}</span>`;
  }).join("");
  box.querySelectorAll(".chip-cat").forEach((el) => {
    el.onclick = () => {
      SEL_CAT = el.dataset.cat;
      box.querySelectorAll(".chip-cat").forEach((x) => x.classList.remove("sel"));
      el.classList.add("sel");
    };
  });
}

// 계정
let ACCOUNTS = [], SEL_ACCOUNTS = null;
async function loadAccounts() {
  const r = await api("/api/accounts");
  ACCOUNTS = (r.ok && r.accounts) ? r.accounts : [];
  const act = ACCOUNTS.find((a) => a.active) || ACCOUNTS[0];
  if (SEL_ACCOUNTS === null) SEL_ACCOUNTS = new Set(act ? [act.id] : []);

  const cur = $("currentAcct");
  if (act) {
    const pic = act.profile_pic ? `<img src="${act.profile_pic}">` : "👤";
    const name = act.username ? ("@" + act.username) : act.label;
    cur.innerHTML = `<span style="display:flex;align-items:center;gap:8px">${pic}<b>${name}</b><span class="hint" style="margin:0">(으)로 게시</span></span>
      <button class="ghost" id="switchAcctBtn" style="width:auto;padding:9px 14px">계정 변경</button>`;
    $("switchAcctBtn").onclick = () => document.querySelector('.tab[data-tab="accounts"]').click();
  } else {
    cur.innerHTML = '<span class="hint">연결된 계정이 없어요. 👤 계정 탭에서 추가하세요.</span>';
  }

  const box = $("postAccounts");
  const chipLabel = (a) => (a.profile_pic ? `<img src="${a.profile_pic}" style="width:18px;height:18px;border-radius:50%;vertical-align:-4px;margin-right:5px">` : "") + (a.username ? "@" + a.username : a.label);
  box.innerHTML = ACCOUNTS.length
    ? ACCOUNTS.map((a) => `<span class="chip-cat${SEL_ACCOUNTS.has(a.id) ? " sel" : ""}" data-acc="${a.id}">${chipLabel(a)}</span>`).join("")
    : '<p class="hint">계정이 없어요. 👤 계정 탭에서 추가하세요.</p>';
  box.querySelectorAll(".chip-cat").forEach((el) => {
    el.onclick = () => {
      const id = el.dataset.acc;
      if (SEL_ACCOUNTS.has(id)) SEL_ACCOUNTS.delete(id); else SEL_ACCOUNTS.add(id);
      el.classList.toggle("sel");
    };
  });

  const list = $("accountList");
  list.innerHTML = ACCOUNTS.length ? ACCOUNTS.map((a) => {
    const pic = a.profile_pic ? `<img src="${a.profile_pic}">` : '<span class="ph">👤</span>';
    const name = a.username ? ("@" + a.username) : "(아이디 미확인)";
    const sw = a.active ? '<span class="badge on">● 사용 중</span>' : `<button class="ghost" style="width:auto;padding:9px 12px" data-active="${a.id}">전환</button>`;
    return `<div class="item acct-row"><span style="display:flex;align-items:center;gap:10px;min-width:0">${pic}<span style="min-width:0"><b>${name}</b><br><span class="hint" style="margin:0">${a.label}</span></span></span><span style="display:flex;gap:6px;flex-shrink:0">${sw}<button class="ghost" style="width:auto;padding:9px 12px" data-del="${a.id}">삭제</button></span></div>`;
  }).join("") : '<p class="hint">아직 계정이 없어요.</p>';
  list.querySelectorAll("[data-active]").forEach((el) => el.onclick = async () => {
    const r2 = await api("/api/accounts/active", { method: "POST", body: JSON.stringify({ id: el.dataset.active }) });
    if (r2.ok) { SEL_ACCOUNTS = new Set([el.dataset.active]); toast("현재 계정 변경됨", "ok"); loadAccounts(); loadStatus(); }
  });
  list.querySelectorAll("[data-del]").forEach((el) => el.onclick = async () => {
    if (!confirm("이 계정을 삭제할까요?")) return;
    await api("/api/accounts/delete", { method: "POST", body: JSON.stringify({ id: el.dataset.del }) });
    SEL_ACCOUNTS && SEL_ACCOUNTS.delete(el.dataset.del); toast("삭제됨", "ok"); loadAccounts();
  });
}
$("refreshAccBtn").onclick = async () => { toast("정보 가져오는 중…"); const r = await api("/api/accounts/refresh", { method: "POST" }); if (r.ok) { toast("새로고침 완료", "ok"); loadAccounts(); loadStatus(); } };
$("addAccBtn").onclick = async () => {
  const label = $("accLabel").value.trim(), user_id = $("accUserId").value.trim(), access_token = $("accToken").value.trim();
  if (!user_id || !access_token) return toast("ID와 토큰을 입력하세요.", "error");
  const r = await api("/api/accounts", { method: "POST", body: JSON.stringify({ label, user_id, access_token }) });
  if (r.ok) { if (SEL_ACCOUNTS) SEL_ACCOUNTS.add(r.id); $("accLabel").value = $("accUserId").value = $("accToken").value = ""; toast("계정 추가됨", "ok"); loadAccounts(); }
  else toast(r.error || "추가 실패", "error");
};

// 자동 주제
$("randTopicBtn").onclick = async () => {
  const r = await api("/api/random_topic", { method: "POST", body: JSON.stringify({ category: SEL_CAT }) });
  if (r.ok) { $("topicInput").value = r.topic; toast("주제: " + r.topic, "ok"); } else toast(r.error || "실패", "error");
};

// 업로드 (사진 여러 장 / 영상)
let UPLOAD_MODE = "attach";
$("uploadBtn").onclick = () => { UPLOAD_MODE = "attach"; $("fileInput").value = ""; $("fileInput").click(); };
$("uploadWriteBtn").onclick = () => { UPLOAD_MODE = "write"; $("fileInput").value = ""; $("fileInput").click(); };
$("fileInput").onchange = async (e) => {
  const files = [...e.target.files]; if (!files.length) return;
  const writing = UPLOAD_MODE === "write";
  toast(writing ? "미디어 분석해서 글 쓰는 중… (20~60초)" : "업로드 중…");
  const fd = new FormData();
  files.forEach((f) => fd.append("files", f));
  fd.append("write", writing ? "1" : "0");
  try {
    const resp = await fetch("/api/upload_media", { method: "POST", body: fd });
    const j = await resp.json();
    if (j.ok) {
      CUR_IMAGES = j.image_urls || []; CUR_VIDEO = j.video_url || null; renderMedia();
      if (j.text) { $("postText").value = j.text; $("charCount").textContent = j.text.length; }
      if (j.text_error) toast("미디어는 올렸지만 글 작성 실패: " + j.text_error, "error");
      else toast(writing ? "미디어 보고 글까지 썼어요!" : "미디어를 올렸어요.", "ok");
      $("mediaWrap").scrollIntoView({ behavior: "smooth", block: "center" });
    } else toast(j.error || "업로드 실패", "error");
  } catch (err) { toast("업로드 오류: " + err, "error"); }
};

// 자동 생성 (글 + AI 사진)
$("autoBtn").onclick = async () => {
  const b = $("autoBtn"); b.disabled = true; b.innerHTML = '<span class="spin"></span>리서치·작성·사진 중… (40~80초)';
  CUR_IMAGES = []; CUR_VIDEO = null; renderMedia();
  try {
    const r = await api("/api/auto", { method: "POST", body: JSON.stringify({ category: SEL_CAT, topic: $("topicInput").value, with_image: true }) });
    if (r.ok) {
      $("postText").value = r.text; $("charCount").textContent = r.text.length;
      if (r.topic) $("topicInput").value = r.topic;
      if (r.image_url) { CUR_IMAGES = [r.image_url]; renderMedia(); toast("글과 사진 완성!", "ok"); }
      else if (r.image_error) toast("글은 됐지만 사진 실패: " + r.image_error, "error");
      else toast("글 생성 완료 (사진은 건너뜀)", "ok");
      (CUR_IMAGES.length ? $("mediaWrap") : $("postText")).scrollIntoView({ behavior: "smooth", block: "center" });
    } else toast(r.error || "실패", "error");
  } catch (e) { toast("오류: " + e, "error"); }
  b.disabled = false; b.textContent = "🎲 글 + 사진 한 번에 자동 생성";
};

// 글만 생성
$("genBtn").onclick = async () => {
  const b = $("genBtn"); b.disabled = true; b.innerHTML = '<span class="spin"></span>리서치·작성 중… (30~60초)';
  try {
    const r = await api("/api/generate", { method: "POST", body: JSON.stringify({ topic: $("topicInput").value, category: SEL_CAT }) });
    if (r.ok) { $("postText").value = r.text; $("charCount").textContent = r.text.length; if (r.topic) $("topicInput").value = r.topic; toast("글 생성 완료", "ok"); }
    else toast(r.error || "실패", "error");
  } catch (e) { toast("오류: " + e, "error"); }
  b.disabled = false; b.textContent = "✨ 글만 생성";
};

// 게시
$("postBtn").onclick = async () => {
  const text = $("postText").value.trim();
  if (!text) return toast("글이 비어 있어요.", "error");
  const ids = SEL_ACCOUNTS ? [...SEL_ACCOUNTS] : [];
  if (ACCOUNTS.length && ids.length === 0) return toast("게시할 계정을 선택하세요.", "error");
  const cnt = ids.length || 1;
  const mediaDesc = CUR_VIDEO ? " (영상 포함)" : (CUR_IMAGES.length ? ` (사진 ${CUR_IMAGES.length}장)` : "");
  if (!confirm(cnt + "개 계정에" + mediaDesc + " 게시할까요?")) return;
  const b = $("postBtn"); b.disabled = true; b.innerHTML = '<span class="spin"></span>게시 중…';
  try {
    const r = await api("/api/post", { method: "POST", body: JSON.stringify({ text, image_urls: CUR_IMAGES, video_url: CUR_VIDEO, topic: $("topicInput").value || null, category: SEL_CAT, account_ids: ids }) });
    if (r.ok) { toast("✅ " + (r.summary || "게시 완료!"), "ok"); $("postText").value = ""; $("charCount").textContent = 0; CUR_IMAGES = []; CUR_VIDEO = null; renderMedia(); loadStatus(); }
    else toast(r.error || "게시 실패", "error");
  } catch (e) { toast("오류: " + e, "error"); }
  b.disabled = false; b.textContent = "🚀 스레드에 게시";
};

// 주제
async function loadTopics() { const r = await api("/api/topics"); if (r.ok) $("topicsArea").value = r.content; }
$("saveTopicsBtn").onclick = async () => { const r = await api("/api/topics", { method: "POST", body: JSON.stringify({ content: $("topicsArea").value }) }); toast(r.ok ? "저장됨" : "실패", r.ok ? "ok" : "error"); if (r.ok) loadCategories(); };

// 스케줄
$("schedStartBtn").onclick = async () => { const r = await api("/api/schedule", { method: "POST", body: JSON.stringify({ action: "start", cron: $("cronSelect").value }) }); if (r.ok) { toast("자동 켜짐", "ok"); loadStatus(); } else toast(r.error || "실패", "error"); };
$("schedStopBtn").onclick = async () => { const r = await api("/api/schedule", { method: "POST", body: JSON.stringify({ action: "stop" }) }); if (r.ok) { toast("자동 꺼짐", "ok"); loadStatus(); } };

// 기록
async function loadHistory() {
  const r = await api("/api/history"); const box = $("histList");
  if (!r.ok || !r.items.length) { box.innerHTML = '<p class="hint">아직 게시 기록이 없어요.</p>'; return; }
  box.innerHTML = r.items.map((it) => `<div class="item"><div class="item-time">${it.time || ""} ${it.account ? "· " + it.account : ""}</div><div class="item-text">${(it.text || "").replace(/</g, "&lt;")}</div></div>`).join("");
}
$("refreshHistBtn").onclick = loadHistory;

loadStatus(); loadCategories(); loadAccounts();
setInterval(loadStatus, 15000);
</script>
</body>
</html>
